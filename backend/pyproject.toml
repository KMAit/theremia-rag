[tool.ruff]
target-version = "py312"
line-length = 100
exclude = [
    ".venv",
    "alembic/versions",
    "__pycache__",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "S",   # flake8-bandit (security)
    "RUF", # ruff-specific
]
ignore = [
    "S101",  # assert statements (ok dans les tests)
    "S105",  # hardcoded passwords (faux positifs sur les constantes de test)
    "S106",
    "B008",  # do not perform function calls in default arguments (FastAPI Depends pattern)
    "N999",  # invalid module name (alembic env.py)
    "E501",  # line too long (géré par formatter)
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S", "B"]  # moins strict dans les tests
"alembic/**/*.py" = ["ALL"]   # alembic généré automatiquement

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--no-header",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::UserWarning",
]

[tool.mypy]
python_version = "3.12"
strict = false
ignore_missing_imports = true
exclude = ["alembic/", ".venv/"]