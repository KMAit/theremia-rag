name: PR Checks

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened]

jobs:
  # ── PR title follows Conventional Commits ──────────────────────────────────
  conventional-commit:
    name: PR title — Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            perf
            test
            docs
            chore
            ci
            style
          requireScope: false

  # ── No direct push to main (belt-and-suspenders) ───────────────────────────
  size-check:
    name: PR size check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD | wc -l)
          echo "Files changed: $CHANGED"
          if [ "$CHANGED" -gt 50 ]; then
            echo "⚠️  Large PR ($CHANGED files). Consider splitting into smaller PRs."
          fi
          # Non-bloquant — juste informatif