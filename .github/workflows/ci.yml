name: CI

on:
  push:
    branches: [main, "features/**", "fix/**", "hotfix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint — ruff check
        run: ruff check .

      - name: Format — ruff format check
        run: ruff format --check .

      - name: Type check — mypy
        run: mypy app --ignore-missing-imports --no-error-summary
        continue-on-error: true  # mypy en warning pour l'instant, pas bloquant

      - name: Run tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-production
          JWT_ALGORITHM: HS256
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 60
          OPENAI_API_KEY: sk-test-fake-key-for-ci
          UPLOAD_DIR: /tmp/theremia-test-uploads
          CHROMA_PERSIST_DIR: /tmp/theremia-test-chroma
          DEBUG: "true"
        run: |
          mkdir -p /tmp/theremia-test-uploads
          pytest tests/ -v --tb=short --no-header \
            --cov=app --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20"]

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint — ESLint
        run: npm run lint

      - name: Type check — tsc
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ── Security audit ─────────────────────────────────────────────────────────
  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: pip-audit (backend)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --ignore-vuln PYSEC-2022-42969 || true

      - name: npm audit (frontend)
        working-directory: frontend
        run: npm audit --audit-level=high || true
